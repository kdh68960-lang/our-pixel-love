<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Our Love</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <section class="card dday-container">
            <div class="pixel-heart">❤️</div>
            <div id="dday-label">우리가 함께한 지</div>
            <div id="dday-count">D+0</div>
            <div id="start-date-display">2026.01.08</div>
        </section>

    <section class="card today-info">
        <div id="current-full-date">2026년 5월 13일 (수)</div>
    </section>

        <section class="card calendar-container">
            <div class="cal-header">
                <button id="prev-btn" class="nav-btn">&lt;</button>
                <span id="cal-month">5월</span>
                <span id="cal-year">2026</span>
                <button id="next-btn" class="nav-btn">&gt;</button>
            </div>
            <div class="weekdays">
                <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
            </div>
            <div id="calendar-days"></div>
        </section>
    </div>
    <!-- OurBox (체크리스트) 섹션 추가 -->
<section class="card ourbox-container">
    <div class="ourbox-header">
        <span class="pixel-icon">📂</span> OurBox
    </div>
    <div class="input-group">
        <input type="text" id="todo-input" placeholder="하고 싶은 일을 적어봐요!">
        <button id="add-btn">등록</button>
    </div>
    <ul id="todo-list">
        <!-- 자바스크립트에서 리스트가 생성될 곳 -->
    </ul>
</section>

    <script src="app.js"></script>
</body>
</html>
